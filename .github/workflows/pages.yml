name: Publish canonical specification

on:
  push:
    branches: [main]
    paths:
      - site/**
      - schema/**
      - spec/**
      - conformance/**
      - test/conformance/**
      - test/parser-conformance/**
      - scripts/build-site.mjs
      - scripts/validate-conformance-manifest.mjs
      - package.json
      - package-lock.json
      - .github/workflows/pages.yml
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: ${{ !github.event.repository.private && github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run manifest:validate
      - run: npm run site:build
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Archive canonical site including well-known metadata
        run: |
          tar --dereference --hard-dereference \
            --directory site-dist \
            --exclude=.git \
            --exclude=.github \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
      - name: Deploy canonical artifacts
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
