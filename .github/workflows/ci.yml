name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 24
          - os: windows-latest
            node: 24
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run verify

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Validate OpenSSF Security Insights metadata
        run: |
          CUE_ARCHIVE_SHA256=e22219a1cb520ab3d660a486ed2222bb7b8e9cb9502a951ce6b8ac668695713f
          SI_SCHEMA_SHA256=4e4b61470b5484fc8969f2a8a77ffbe0712a7c8a870c2079188f246c14cd58b1
          TEMP_DIRECTORY=$(mktemp -d)
          curl --fail --silent --show-error --location \
            https://github.com/cue-lang/cue/releases/download/v0.17.0/cue_v0.17.0_linux_amd64.tar.gz \
            --output "$TEMP_DIRECTORY/cue.tar.gz"
          echo "$CUE_ARCHIVE_SHA256  $TEMP_DIRECTORY/cue.tar.gz" | sha256sum --check --strict
          tar --extract --gzip --file "$TEMP_DIRECTORY/cue.tar.gz" --directory "$TEMP_DIRECTORY" cue
          curl --fail --silent --show-error --location \
            https://raw.githubusercontent.com/ossf/security-insights/v2.2.0/spec/schema.cue \
            --output "$TEMP_DIRECTORY/security-insights.cue"
          echo "$SI_SCHEMA_SHA256  $TEMP_DIRECTORY/security-insights.cue" | sha256sum --check --strict
          "$TEMP_DIRECTORY/cue" vet "$TEMP_DIRECTORY/security-insights.cue" \
            security-insights.yml -d '#SecurityInsights'
      - run: npm audit --omit=dev --audit-level=low
      - run: npm audit signatures
      - run: npm run build
      - run: npm run package:validate
      - run: npm run artifact:validate
