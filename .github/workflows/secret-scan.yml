name: Secret scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '41 6 * * 4'
  workflow_dispatch:

concurrency:
  group: secret-scanning-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks full history
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan every reachable commit with checksum-pinned Gitleaks
        run: bash scripts/scan-secrets.sh
