name: Extended fuzzing

on:
  pull_request:
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:
    inputs:
      seed:
        description: Optional uint32 decimal or hexadecimal fuzz seed
        required: false
        type: string

concurrency:
  group: extended-fuzzing-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'scheduled' || format('manual-{0}', github.run_id) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Run rotating reproducible campaign
        env:
          FUZZ_SEED: ${{ inputs.seed || github.run_number }}
        run: npm run fuzz:extended -- --seed "$FUZZ_SEED"
